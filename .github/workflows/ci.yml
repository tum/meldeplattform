name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Pint (code style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-security-blocking

      - name: Run Pint
        run: vendor/bin/pint --test

  phpstan:
    name: PHPStan (level 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, zip, bcmath, pdo, pdo_sqlite, gd
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-security-blocking

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  tests:
    name: Tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql]
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_DATABASE: meldeplattform_test
          MARIADB_USER: meldeplattform
          MARIADB_PASSWORD: secret
          MARIADB_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, zip, bcmath, pdo, pdo_sqlite, pdo_mysql, gd
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-security-blocking

      - name: Prepare .env
        run: cp .env.example .env && php artisan key:generate

      - name: Run PHPUnit (sqlite)
        if: matrix.db == 'sqlite'
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: vendor/bin/phpunit --colors=always

      - name: Run PHPUnit (mysql)
        if: matrix.db == 'mysql'
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: meldeplattform_test
          DB_USERNAME: meldeplattform
          DB_PASSWORD: secret
        run: vendor/bin/phpunit --colors=always
